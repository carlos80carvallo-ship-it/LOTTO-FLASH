<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto Flash Pro - CarlosC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #0a0f1d; color: white; margin: 0; padding: 15px; }
        .card-gold { background: linear-gradient(145deg, #16213e, #0f172a); border-radius: 20px; border: 1px solid rgba(255, 215, 0, 0.1); margin-bottom: 10px; padding: 15px; }
        .circle-result { width: 45px; height: 45px; background: linear-gradient(145deg, #f1c40f, #b7950b); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: black; font-weight: bold; font-size: 1.1rem; box-shadow: 0 0 15px rgba(241, 196, 15, 0.4); }
        .live-pulse { width: 10px; height: 10px; background-color: #22c55e; border-radius: 50%; display: inline-block; animation: pulse-green 1.5s infinite; }
        @keyframes pulse-green { 0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); } 100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); } }
        .logo-box { background-color: #f1c40f; color: black; padding: 5px 12px; border-radius: 10px; font-weight: bold; font-size: 1.5rem; }
    </style>
</head>

                <div class="flex items-center gap-1">

                    <span class="text-green-500 text-xs font-bold tracking-widest uppercase">Live</span>

                </div>
            </div>
        </div>
        <div id="reloj" class="text-yellow-500 font-bold text-xl tracking-tighter">--:--:--</div>

    <div class="card-gold text-center">
        <input type="password" id="admin-pass" placeholder="Clave de Admin" class="bg-gray-800 text-white p-3 w-full mb-2 rounded-lg text-center border-none">
        <button id="auth-btn" class="bg-yellow-500 text-black w-full py-3 rounded-lg font-bold uppercase hover:bg-yellow-400">ACCEDER AL SISTEMA</button>
    </div>

                <i class="fab fa-whatsapp text-green-500 text-xl"></i>
            </div>
