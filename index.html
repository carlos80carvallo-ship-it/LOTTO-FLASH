<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto Flash Pro - CarlosC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #0a0f1d; color: white; }
        .card-gold { 
            background: linear-gradient(145deg, #16213e, #0f172a);
            border-radius: 20px;
            border: 1px solid rgba(255, 215, 0, 0.1);
        }
        .btn-gold { background: linear-gradient(to bottom, #f1c40f, #d4ac0d); color: #000; font-weight: bold; }
        .circle-result {
            width: 45px; height: 45px;
            background: linear-gradient(145deg, #f1c40f, #b7950b);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: black; font-weight: bold; font-size: 1.1rem;
            box-shadow: 0 0 15px rgba(241, 196, 15, 0.4);
        }
        .live-pulse {
            width: 10px; height: 10px;
            background-color: #22c55e;
            border-radius: 50%;
            display: inline-block;
            animation: pulse-green 1.5s infinite;
        }
        @keyframes pulse-green {
            0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); }
            100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }
        .logo-box {
            background-color: #f1c40f; color: black;
            padding: 5px 10px; border-radius: 10px; font-weight: bold;
        }
    </style>
</head>
<body class="p-4">

    <header class="mb-6 relative">
        <div class="flex justify-between items-start">
            <div class="flex items-center gap-2">
                <div class="logo-box text-2xl">LF</div>
                <div>
                    <h1 class="text-4xl font-bold tracking-tighter italic">LOTTO</h1>
                    <div class="flex items-center gap-1 text-xs font-bold">
                        <span class="live-pulse"></span>
                        <span class="text-green-500 tracking-widest">● LIVE</span>
                        <span class="text-yellow-500 ml-1 italic font-bold text-2xl">FLASH</span>
                    </div>
                </div>
            </div>
            <div id="reloj" class="text-yellow-500 font-bold text-xl pt-2">00:00:00</div>
        </div>
        <div class="mt-4 text-2xl font-bold text-gray-300" id="fecha-hoy">--/--/----</div>
    </header>

    <main class="max-w-md mx-auto space-y-4">
        
        <div class="flex gap-2 mb-4">
            <select class="bg-gray-800 p-2 rounded-lg text-sm border border-gray-600 flex-1">
                <option>Lotto Activo</option>
                <option>La Granjita</option>
            </select>
            <input type="date" id="date-picker" class="bg-gray-800 p-2 rounded-lg text-sm border border-gray-600 flex-1 text-white">
        </div>

        <div id="admin-auth" class="card-gold p-4 mb-4">
            <input type="password" id="admin-pass" placeholder="Clave de Admin" class="bg-gray-800 border-none text-white p-3 w-full mb-2 rounded-lg text-center">
            <button id="auth-btn" class="btn-gold w-full py-3 rounded-lg uppercase">ACCEDER</button>
        </div>

        <div id="admin-panel" class="hidden card-gold p-6 border-2 border-yellow-500 mb-6">
            <h2 class="text-yellow-500 font-bold mb-4 text-center">PUBLICAR RESULTADO</h2>
            <form id="result-form" class="space-y-4 text-black">
                <select id="lottery-select" class="w-full p-3 rounded-lg"><option value="lotto">Lotto Activo</option><option value="granjita">La Granjita</option></select>
                <select id="time-select" class="w-full p-3 rounded-lg">
                    <option value="08">08:00 AM</option><option value="09">09:00 AM</option><option value="10">10:00 AM</option>
                    <option value="11">11:00 AM</option><option value="12">12:00 PM</option><option value="01">01:00 PM</option>
                    <option value="04">04:00 PM</option><option value="07">07:00 PM</option>
                </select>
                <input type="text" id="result-input" placeholder="Animalito o Nº" class="w-full p-3 rounded-lg text-center text-xl font-bold uppercase">
                <button type="submit" class="bg-green-500 text-black w-full py-4 rounded-xl font-bold">SUBIR AHORA</button>
            </form>
        </div>

        <div id="lista-resultados" class="space-y-3"></div>

        <div class="mt-8 text-center space-y-4 pb-10">
            <button onclick="compartirApp()" class="btn-gold px-8 py-3 rounded-full shadow-lg w-full flex items-center justify-center gap-2 font-bold uppercase">
                <i class="fas fa-share-alt"></i> COMPARTIR APP
            </button>
            <div class="pt-6">
                <p class="text-xs text-gray-500 uppercase">Diseñado y Desarrollado por</p>
                <h2 class="text-2xl font-bold text-white uppercase tracking-widest">CarlosC</h2>
                <p class="text-[10px] text-gray-600 mt-2">Innovación © 2026</p>
            </div>
        </div>
    </main>

    <script>
        // Reloj y Fecha
        function actualizarReloj() {
            const ahora = new Date();
            document.getElementById('reloj').innerText = ahora.toLocaleTimeString();
            document.getElementById('fecha-hoy').innerText = ahora.toLocaleDateString();
            document.getElementById('date-picker').valueAsDate = ahora;
        }
        setInterval(actualizarReloj, 1000);
        actualizarReloj();
