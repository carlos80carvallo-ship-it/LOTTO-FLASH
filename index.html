<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lotto Flash Pro - CarlosC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0a0f1d; color: white; padding: 15px; font-family: sans-serif; }
        .card-gold { background: linear-gradient(145deg, #16213e, #0f172a); border-radius: 20px; border: 1px solid rgba(255, 215, 0, 0.2); margin-bottom: 12px; padding: 15px; }
        .circle-result { width: 45px; height: 45px; background: #f1c40f; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: black; font-weight: bold; box-shadow: 0 0 15px rgba(241, 196, 15, 0.3); }
        .logo-box { background: #f1c40f; color: black; padding: 5px 12px; border-radius: 10px; font-weight: bold; font-size: 1.5rem; }
        .live-pulse { width: 10px; height: 10px; background: #22c55e; border-radius: 50%; display: inline-block; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); } 100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); } }
    </style>
</head>
<body>

    <header class="flex justify-between items-center mb-2">
        <div class="flex items-center gap-3">
            <div class="logo-box">LF</div>
            <div>
                <h1 class="text-3xl font-bold italic leading-none">LOTTO</h1>
                <div class="flex items-center gap-1">
                    <span class="live-pulse"></span>
                    <span class="text-green-500 text-xs font-bold uppercase">Live</span>
                    <span class="text-yellow-500 text-xl font-bold italic ml-1">FLASH</span>
                </div>
            </div>
        </div>
        <div id="reloj" class="text-yellow-500 font-bold text-xl">--:--:--</div>
    </header>

    <p id="fecha-hoy" class="text-2xl font-bold text-gray-400 mb-6">--/--/----</p>

    <div class="flex gap-2 mb-6">
        <input type="date" id="busqueda-fecha" class="bg-gray-800 text-white p-3 rounded-lg border border-yellow-500 flex-1 font-bold">
    </div>

    <div class="card-gold text-center">
        <input type="password" id="admin-pass" placeholder="Clave de Admin" class="bg-gray-800 text-white p-3 w-full mb-2 rounded-lg text-center border-none">
        <button onclick="acceder()" class="bg-yellow-500 text-black w-full py-3 rounded-lg font-bold">ACCEDER AL SISTEMA</button>
    </div>

    <div id="lista-resultados" class="mt-6 space-y-3">
        </div>

    <div class="mt-8 text-center pb-10">
        <p class="text-xs text-gray-500">DISEÑO POR</p>
        <h2 class="text-2xl font-bold tracking-widest">CarlosC</h2>
    </div>

    <script>
        // Función de Reloj inmediata
        function actualizarReloj() {
            const d = new Date();
            document.getElementById('reloj').innerHTML = d.toLocaleTimeString();
            document.getElementById('fecha-hoy').innerHTML = d.toLocaleDateString();
        }
        setInterval(actualizarReloj, 1000);
        actualizarReloj();

        // Dibujar horarios de 08:00 AM a 07:00 PM
        const horas = ["08:00 AM", "09:00 AM", "10:00 AM", "11:00 AM", "12:00 PM", "01:00 PM", "04:00 PM", "05:00 PM", "06:00 PM", "07:00 PM"];
        const lista = document.getElementById('lista-resultados');
        
        horas.forEach(h => {
            const idH = h.split(':')[0];
            lista.innerHTML += `
                <div class="card-gold flex justify-between items-center">
                    <div><p class="text-[10px] text-gray-500">HORARIO</p><h3 class="text-lg font-bold">${h}</h3></div>
                    <div class="flex items-center gap-3">
                        <span class="text-yellow-500 font-bold text-sm" id="name-${idH}">ESPERANDO...</span>
                        <div id="res-${idH}" class="circle-result">--</div>
                        <i class="fab fa-whatsapp text-green-500 text-xl"></i>
                    </div>
                </div>`;
        });

        function acceder() {
            const p = document.getElementById('admin-pass').value;
            if(p === "19Bc*.Ks*9") alert("Panel Abierto");
            else alert("Clave Incorrecta");
        }
    </script>
</body>
</html>
